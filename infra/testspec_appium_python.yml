version: 0.1

# AWS Device Farm custom test environment spec (Appium 3 + Python).
# AWS 기본 스펙 기반. Device Farm 리눅스 호스트에서 requirements.txt 를 직접 설치하므로
# wheelhouse 를 미리 빌드할 필요 없음(인터넷에서 자동 설치).
android_test_host: amazon_linux_2

phases:
  install:
    commands:
      - devicefarm-cli use node 22
      - devicefarm-cli use appium 3
      - export APPIUM_BASE_PATH=
      - devicefarm-cli use python 3.11
      - python --version
      - cd $DEVICEFARM_TEST_PACKAGE_PATH
      - python -m pip install -r requirements.txt
  pre_test:
    commands:
      # 기기별 capability 는 DEVICEFARM_* 환경변수에서 주입되어 Appium 서버 기본값으로 설정됨.
      - |-
        appium --base-path=$APPIUM_BASE_PATH --log-timestamp \
          --log-no-colors --relaxed-security --default-capabilities \
          "{\"appium:deviceName\": \"$DEVICEFARM_DEVICE_NAME\", \
          \"platformName\": \"$DEVICEFARM_DEVICE_PLATFORM_NAME\", \
          \"appium:app\": \"$DEVICEFARM_APP_PATH\", \
          \"appium:udid\":\"$DEVICEFARM_DEVICE_UDID\", \
          \"appium:platformVersion\": \"$DEVICEFARM_DEVICE_OS_VERSION\", \
          \"appium:automationName\": \"UiAutomator2\"}" \
          >> $DEVICEFARM_LOG_DIR/appium.log 2>&1 &
      - |-
        appium_initialization_time=0;
        until curl --silent --fail "http://0.0.0.0:4723${APPIUM_BASE_PATH}/status"; do
          if [[ $appium_initialization_time -gt 30 ]]; then
            echo "Appium did not start within 30 seconds. Exiting..."; exit 1;
          fi;
          appium_initialization_time=$((appium_initialization_time + 1));
          sleep 1;
        done;
  test:
    commands:
      - cd $DEVICEFARM_TEST_PACKAGE_PATH
      - python -m pytest tests/ --junit-xml $DEVICEFARM_LOG_DIR/junitreport.xml
  post_test:
    commands:

artifacts:
  - $DEVICEFARM_LOG_DIR
